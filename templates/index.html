<!DOCTYPE html>
<html lang="{{ t.html_lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>{{ t.page_title }}</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/syntax.css" />
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <script src="/static/tooltips.js" defer></script>
</head>
<body class="locale-{{ lang }}">
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <path fill="currentColor" d="M12 2 4 6v6c0 5 3.4 9.5 8 10 4.6-.5 8-5 8-10V6l-8-4Zm-1 14-4-4 1.4-1.4L11 13.2l5.6-5.6L18 9l-7 7Z"/>
        </svg>
      </div>
      <div>
        <h1>{{ t.brand_h1 }}</h1>
        <p class="tagline">{{ t.brand_tagline }}</p>
      </div>
    </div>
    <div class="header-meta">
      <div class="lang-switcher" role="group" aria-label="{{ t.lang_switcher_label }}">
        <a class="lang-option{% if lang == 'ja' %} is-active{% endif %}"
           href="/?lang=ja"
           hx-boost="false"
           lang="ja"
           {% if lang == 'ja' %}aria-current="true"{% endif %}>
          日本語
        </a>
        <a class="lang-option{% if lang == 'en' %} is-active{% endif %}"
           href="/?lang=en"
           hx-boost="false"
           lang="en"
           {% if lang == 'en' %}aria-current="true"{% endif %}>
          English
        </a>
      </div>
      <span class="meta-pill">{{ t.header_meta_pill }}</span>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar" aria-label="{{ t.sidebar_title }}">
      <h2 class="sidebar-title">{{ t.sidebar_title }}</h2>
      <nav class="scenario-list">
        {% for s in scenarios %}
        <button type="button"
                class="scenario-item{% if s.id == scenario.id %} is-active{% endif %}"
                hx-get="/scenarios/{{ s.id }}"
                hx-target="#scenario-panel"
                hx-swap="innerHTML"
                hx-on::after-request="document.querySelectorAll('.scenario-item').forEach(el => el.classList.remove('is-active')); this.classList.add('is-active');">
          <span class="scenario-letter">{{ loop.index | string }}</span>
          <span class="scenario-text">
            <span class="scenario-name">{{ s.title }}</span>
            <span class="scenario-sub">{{ s.subtitle }}</span>
          </span>
        </button>
        {% endfor %}
      </nav>
      <footer class="sidebar-footer">
        <p class="sidebar-note">
          {{ t.sidebar_note }}
        </p>
      </footer>
    </aside>

    <section id="scenario-panel" class="scenario-panel">
      {% include "_scenario_panel.html" %}
    </section>
  </main>
</body>
</html>
